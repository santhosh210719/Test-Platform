<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dev-bees — Results</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="topbar__brand">
        <div class="topbar__logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span>dev-bees</span>
      </a>
      <nav class="topbar__nav">
        <span class="topbar__meta">Assessment Complete</span>
      </nav>
    </header>

    <main class="main">
      <div class="wrap animate-in">
        <div class="card">
          <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0.5rem;">Assessment Complete</h1>
            <p class="sub">Your performance analysis is ready.</p>
          </div>

          <div class="score-wrap">
            <p class="score-label" style="margin-bottom: 0;">Overall Score</p>
            <p class="score-big" id="score-display">0/10</p>
          </div>

          <div id="attempt-summary-block" style="display: none; margin-bottom: 1.5rem;"></div>

          <div id="result-meta" style="margin-bottom: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"></div>
          <p id="save-status" class="sub" style="text-align: center; font-size: 0.8rem;"></p>

          <h3 style="margin-top: 2rem; display: flex; align-items: center; gap: 0.5rem;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            AI Performance Feedback
          </h3>
          <div class="feedback-section" id="ai-feedback" style="margin-bottom: 2rem;"></div>
          
          <p id="gemini-error-box" class="error-msg gemini-error-box" style="display: none"></p>

          <details class="feedback-section" id="gemini-details" style="background: var(--surface-2); border: 1px dashed var(--border);">
            <summary style="cursor:pointer; font-weight: 600; color: var(--text-dim);">Detailed AI Insights (via Gemini)</summary>
            <div style="padding-top: 1rem;">
              <p class="sub" style="font-size: 0.85rem;">Get deeper analysis by connecting your Google AI Studio key.</p>
              <div id="gemini-key-panel">
                <input
                  type="password"
                  id="gemini-key-input"
                  placeholder="Paste your Gemini API key here"
                  style="margin-bottom: 1rem;"
                />
                <div class="btn-row">
                  <button type="button" class="btn btn-sm" id="gemini-key-save">Analyze Performance</button>
                </div>
              </div>
            </div>
          </details>

          <div class="nav-links" style="margin-top: 3rem; flex-direction: column;">
            <a class="btn" href="index.html" style="width: 100%;">Return to Home</a>
            <a class="btn btn-secondary" href="dashboard.html" style="width: 100%;">Teacher Portal Access</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer" id="result-footer"></footer>

    <script>
      window.GEMINI_API_KEY_OVERRIDE = "";
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.local.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/results-store.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/result.js"></script>
  </body>
</html>
