<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Lab — Test</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="topbar__brand">Interview Lab</a>
      <span class="topbar__meta">Timed MCQ · 10 questions</span>
    </header>

    <main class="main">
      <div class="wrap">
        <div class="card" id="test-root">
          <h1>Your test</h1>
          <p class="sub">Answer every question, then submit. The test auto-submits when time runs out.</p>

          <div class="timer-bar" id="timer-bar">
            <span class="timer-bar__pill"
              >Topic <strong id="category-label">—</strong></span
            >
            <span class="timer-bar__pill"
              >Time left <strong id="timer-display">15:00</strong></span
            >
          </div>

          <form id="test-form">
            <div id="questions-container"></div>
            <div class="test-actions">
              <button type="submit" class="btn">Submit answers</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">Need to leave? Your timer keeps running until you submit or time expires.</footer>

    <script src="js/questions.js"></script>
    <script src="js/test.js"></script>
  </body>
</html>
