<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Lab — Teacher</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="topbar__brand">Interview Lab</a>
      <span class="topbar__meta">Teacher dashboard</span>
    </header>

    <main class="main">
      <div class="wrap wrap--wide">
        <div class="card pin-card" id="teacher-gate">
          <div class="card__lead">
            <div class="card__icon" aria-hidden="true">◆</div>
            <div>
              <h1>Teacher access</h1>
              <p class="sub">Enter the PIN to view student attempts.</p>
            </div>
          </div>
          <form id="pin-form">
            <label for="teacher-pin">PIN</label>
            <input
              type="password"
              id="teacher-pin"
              autocomplete="current-password"
              required
              placeholder="Enter PIN"
            />
            <button type="submit" class="btn">Unlock dashboard</button>
          </form>
          <p class="sub pin-card__back">
            <a href="index.html" class="link-quiet">← Back to student login</a>
          </p>
        </div>

        <div class="card" id="dashboard-panel" style="display: none">
          <h1>All results</h1>
          <p class="sub">
            Firestore collection <code>students</code> plus any attempts stored in this browser only.
          </p>
          <p id="dashboard-hint" class="sub"></p>
          <p id="load-error" class="error-msg"></p>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Register No</th>
                  <th>Category</th>
                  <th>Score</th>
                  <th>Time</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
          <div class="nav-links nav-links--end">
            <a class="btn btn-secondary" href="index.html">Student login</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">Keep your teacher PIN private.</footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/results-store.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
